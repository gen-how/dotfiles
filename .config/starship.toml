"$schema" = 'https://starship.rs/config-schema.json'

add_newline = false

format = """
$username\
$hostname\
$localip\
$shlvl\
$singularity\
$kubernetes\
$directory\
$vcsh\
$fossil_branch\
$fossil_metrics\
$git_branch\
$git_commit\
$git_state\
$git_metrics\
$git_status\
$hg_branch\
$hg_state\
$pijul_channel\
$docker_context\
$package\
$c\
$cmake\
$cobol\
$daml\
$dart\
$deno\
$dotnet\
$elixir\
$elm\
$erlang\
$fennel\
$fortran\
$gleam\
$golang\
$guix_shell\
$haskell\
$haxe\
$helm\
$java\
$julia\
$kotlin\
$gradle\
$lua\
$nim\
$nodejs\
$ocaml\
$opa\
$perl\
$php\
$pulumi\
$purescript\
$python\
$quarto\
$raku\
$rlang\
$red\
$ruby\
$rust\
$scala\
$solidity\
$swift\
$terraform\
$typst\
$vlang\
$vagrant\
$zig\
$buf\
$nix_shell\
$conda\
$meson\
$spack\
$memory_usage\
$aws\
$gcloud\
$openstack\
$azure\
$nats\
$direnv\
$env_var\
$mise\
$crystal\
$custom\
$sudo\
$cmd_duration\
$line_break\
$jobs\
$battery\
$time\
$status\
$os\
$container\
$netns\
$shell\
$character
"""

[directory]
fish_style_pwd_dir_length = 1
format = "[$path]($style)[$read_only]($read_only_style) "
style = "blue"
read_only = " 🔒"
read_only_style = "red"

[cmd_duration]
format = "用時 [$duration]($style) "
style = "yellow"

[line_break]
disabled = true

[character]
success_symbol = "[\\$](green)"
error_symbol = "[\\$](red)"

[git_branch]
format = "[$symbol$branch(:$remote_branch)]($style) "
symbol = " "
style = "green"

[git_status]
format = """\
(\
[$conflicted](red)\
[$stashed](cyan)\
[$deleted](red)\
[$renamed](purple)\
[$modified](yellow)\
[$typechanged](yellow)\
[$staged](yellow)\
[$untracked](cyan)\
[$ahead_behind](green)\
)\
"""
conflicted = "~${count} "
ahead = ">${count} "
diverged = ">${ahead_count} <${behind_count} "
behind = "<${count} "
up_to_date = ""
untracked = "?${count} "
stashed = "*${count} "
modified = "!${count} "
staged = "+${count} "
renamed = "R${count} "
typechanged = ""
deleted = "X${count} "
